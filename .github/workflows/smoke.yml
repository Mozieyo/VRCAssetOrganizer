name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PySide6>=6.5.0

      - name: Import check — all modules
        run: |
          python -c "import vrc_organizer; print('vrc_organizer OK')"
          python -c "from vrc_organizer.database import queries; print('database OK')"
          python -c "from vrc_organizer.scanner import orchestrator; print('scanner OK')"
          python -c "from vrc_organizer.workers import importer; print('workers OK')"
          python -c "from vrc_organizer.tools import registry; print('tools OK')"
          python -c "from vrc_organizer.models import asset; print('models OK')"
          python -c "from vrc_organizer.ui import main_window; print('ui OK')"

      - name: Syntax check — core files
        run: |
          python -m py_compile vrc_organizer/auto_tagger.py
          python -m py_compile vrc_organizer/tag_data.py
          python -m py_compile vrc_organizer/main.py
          python -m py_compile vrc_organizer/app.py
          python -m py_compile vrc_organizer/database/queries.py
          python -m py_compile vrc_organizer/database/connection.py
          python -m py_compile vrc_organizer/scanner/orchestrator.py
          python -m py_compile vrc_organizer/workers/importer.py
          python -m py_compile vrc_organizer/ui/main_window.py
          python -m py_compile vrc_organizer/ui/sidebar.py
          python -m py_compile vrc_organizer/ui/inspector.py
          python -m py_compile vrc_organizer/ui/thumbnail_grid.py
          python -m py_compile vrc_organizer/ui/body_map.py
          python -m py_compile vrc_organizer/tools/registry.py
          python -m py_compile vrc_organizer/tools/launcher.py
          echo "All syntax checks passed"
